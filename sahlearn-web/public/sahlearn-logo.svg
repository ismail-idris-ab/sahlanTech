<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 300 72" width="300" height="72"
     xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SahLearn">
  <defs>
    <style><![CDATA[@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');]]></style>
  </defs>

  <!-- ╔═ S LETTERMARK ══════════════════════════════╗ -->
  <!-- Two cubic-bezier arcs: upper opens right,     -->
  <!-- lower opens left — together forming a clean S -->
  <path
    d="M 24,6 C 40,6 40,32 24,32 C 8,32 8,58 24,58"
    stroke="#0D1F3C"
    stroke-width="5.6"
    stroke-linecap="round"
    fill="none"/>

  <!-- Teal anchor dot — top of S (the "spark") -->
  <circle cx="24" cy="6"  r="5.2" fill="#00C9A7"/>
  <!-- Echo dot — bottom of S -->
  <circle cx="24" cy="58" r="3.4" fill="#00A88B" opacity="0.55"/>

  <!-- ╔═ WORDMARK ═══════════════════════════════════╗ -->
  <!-- "SahLearn" — Plus Jakarta Sans 600, tight track -->
  <text
    x="62" y="46"
    font-family="'Plus Jakarta Sans', 'Outfit', system-ui, sans-serif"
    font-size="30"
    font-weight="600"
    letter-spacing="-0.5"
    fill="#0D1F3C">SahLearn</text>

  <!-- Subtext: discipline tag -->
  <text
    x="64" y="64"
    font-family="'Plus Jakarta Sans', system-ui, sans-serif"
    font-size="9.5"
    font-weight="400"
    letter-spacing="3.2"
    fill="#00A88B"
    opacity="0.8">DIGITAL SKILLS TRAINING</text>

</svg>