<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2235"/>
      <stop offset="100%" style="stop-color:#0F1726"/>
    </linearGradient>
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E84A0C"/>
      <stop offset="100%" style="stop-color:#F5A200"/>
    </linearGradient>
    <linearGradient id="leafFav" x1="0%" y1="100%" x2="60%" y2="0%">
      <stop offset="0%" style="stop-color:#8BBF00"/>
      <stop offset="100%" style="stop-color:#E8F000"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)"/>

  <!-- "S" letter bold -->
  <text x="5" y="24" font-family="'Arial Black', Impact, sans-serif" font-weight="900"
    font-size="24" fill="url(#sGrad)" letter-spacing="-1">S</text>

  <!-- Leaf in top-right corner of the S -->
  <g transform="translate(18, 5) rotate(-10)">
    <path d="M0,11 C-5,7 -6,2 0,-1 C6,2 5,7 0,11 Z" fill="url(#leafFav)"/>
    <line x1="0" y1="10" x2="0" y2="0" stroke="#4A7000" stroke-width="0.6" opacity="0.7"/>
  </g>
</svg>
